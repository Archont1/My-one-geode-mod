name: My-one-geode-mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: win
          - name: macOS
            os: macos-latest
            target: mac
          - name: iOS
            os: macos-latest
            target: ios
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          sdk: 'latest'
          combine: true
      - uses: actions/upload-artifact@v4
        with:
          name: geode-build-${{ matrix.config.target }}
          path: build/*.geode

  combine:
    name: Combine builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build
      - uses: actions/upload-artifact@v4
        with:
          name: Universal-Mod
          path: ${{ steps.build.outputs.build-output }}
