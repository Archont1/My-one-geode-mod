name: My-one-geode-mod 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        
          - name: Windows
            os: windows-latest
            target: Win32
            
          - name: macOS
            os: macos-latest
            target: MacOS
            
          - name: iOS
            os: macos-latest
            target: iOS
            
          - name: Android32
            os: ubuntu-latest
            target: Android32
            
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          sdk: 'latest'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}-Mod
          path: build/*.geode
